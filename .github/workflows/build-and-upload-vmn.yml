# This workflow builds and uploads vmn to PyPI
# Triggered manually with version type selection

name: Build vmn package and upload to PyPI

on:
  workflow_dispatch:
    inputs:
      version_type:
        type: choice
        description: Version type
        options:
          - patch
          - minor
          - major
          - rc
        required: true

jobs:
  build_pkg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for vmn git operations

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

      - name: Run lint checks
        run: |
          uvx ruff check .
          uvx ruff format --check .

      - name: Run tests
        # Skip Docker-dependent tests (backward compatibility tests)
        run: uv run pytest tests/ -v --ignore=tests/test_perf_show.py -k "not (backward_compatability or problem_found_in_real)" -n auto

      - name: Run vmn stamp version
        run: |
          uv pip install vmn
          git status
          make _${{ github.event.inputs.version_type }}
          git status
          cat .vmn/vmn.log

      - name: Build package
        run: |
          make _build
          ls -ltrh ./dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          make upload
